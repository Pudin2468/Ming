<!DOCTYPE html>
<html lang="pt_BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}IMC{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <h1> Calculadora de IMC</h1>
    
    <form action="/calcular" method="post">
    
        <label>Nome:</label>
        <input type="text" name="nome" required><br><br>

        <label>Idade:</label>
        <input type="number" name="idade" required><br><br>

        <label>Sexo:</label>
        <input type="text" name="sexo" required><br><br>

        <label>Peso (kg):</label>
        <input type="number" id="peso" name="peso" step="0.01" required><br><br>

        <label>Altura (m):</label>
        <input type="number" id="altura" name="altura" step="0.01" required><br><br>

        <button type="submit">Calcular IMC</button>
    </form>

</body>
<script>
// Adiciona um evento de input para formatar os campos de peso e altura
document.getElementById('peso').addEventListener('input', function() {
    let valor = this.value.replace(/\D/g, "");

    if(valor.length >= 2){
        valor = valor.slice(0, -2) + "." + valor.slice(-2);
    }

    this.value = valor;

}); 
document.getElementById('altura').addEventListener('input', function() {
    let valor = this.value.replace(/\D/g, "");

    if(valor.length >= 2){
        valor = valor.slice(0, -2) + "." + valor.slice(-2);
    }

    this.value = valor;

});
</script>
</html>
